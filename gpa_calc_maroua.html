<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>حساب المعدل</title>
    <link rel="stylesheet" href="main_style.css">
</head>
<body>
    <h3>حساب المعدل الفصلي</h3>
    <form id="calcForm" action="calculate_gpa.php" method="POST">
        <label>اسم المادة:</label>
        <input type="text" name="c_name" required>
        <label>عدد الساعات:</label>
        <input type="number" name="c_hours" required min="1">
        <label>التقدير:</label>
        <select name="c_grade" required>
            <option value="4.0">A / A+</option>
            <option value="3.0">B</option>
            <option value="2.0">C</option>
            <option value="1.0">D</option>
            <option value="0.0">F</option>
        </select>
        <button type="submit">احسب المعدل</button>
    </form>
    <script src="validation.js"></script>
</body>
</html>
