<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GPA Calculator - Maroua</title>
    <link rel="stylesheet" href="style_maroua.css">
</head>
<body>
    <h1>GPA Calculator (Step 1)</h1>
    <form action="calculate_maroua.php" method="post" 
        onsubmit="return validateForm();">
        <div id="course-container">
            <div class="course-row">
                <input type="text" name="course[]" 
                    placeholder="Course Name" required>
                <input type="number" name="credits[]"
                    placeholder="Credits" min="1" required>
                <select name="grade[]">
                    <option value="4.0">A</option>
                    <option value="3.0">B</option>
                    <option value="2.0">C</option>
                    <option value="1.0">D</option>
                    <option value="0.0">F</option>
                </select>
            </div>
        </div>
        <br>
        <button type="button" onclick="addCourseRow()">
            + Add Course</button>
        <input type="submit" value="Calculate GPA">
    </form>
    <script src="script_maroua.js"></script>
</body>
</html>
